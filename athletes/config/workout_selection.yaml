# Workout Selection Matrix — Phase × Archetype → Workout Slots
# Source: block-builder references/workout-selection.md
#
# Each phase defines workout slots (intensity_1, intensity_2, intensity_3,
# long_ride, filler) with archetype-specific overrides.
#
# Level ranges indicate which levels are appropriate for each phase.
# Series coherence: same workout name across load weeks, +1 level per week.

phases:
  base:
    description: "Build aerobic engine, maintain VO2max ceiling, develop force"
    weeks_to_race: ">16"
    level_range: [1, 3]
    slots:
      intensity_1:
        default: "VO2max 30/30"
        frequency: "every ~14 days"
        overrides:
          time_crunched: {name: "VO2max 30/30", note: "every 10-12 days"}
          volume: {name: "VO2max 40/20", note: "every 14 days"}
          goat: {name: "VO2max Steady Intervals", note: "every 14 days"}
      intensity_2:
        default: "Tempo with Accelerations"
        alternatives: ["Cadence Work", "Mixed Intervals", "Mixed Climbing"]
        overrides:
          time_crunched: {name: "Tempo with Accelerations"}
          volume: {name: "Mixed Climbing Variations"}
      intensity_3:
        default: "SFR"
        note: "Only if hours allow. Time-crunched: skip."
        overrides:
          time_crunched: null  # skip — stick to 2
          volume: {name: "SFR", note: "SFR + on-bike strength"}
      long_ride:
        default: "Endurance"
        alternatives: ["Endurance Blocks", "NP/IF Target"]
        level_range: [3, 6]
        overrides:
          time_crunched: {name: "Endurance", level_range: [3, 4]}
          volume: {name: "Endurance with Surges", level_range: [4, 6]}
      filler:
        default: "Endurance"
        pool: ["Endurance", "Cadence Work", "Endurance"]
        level_range: [1, 3]
        overrides:
          time_crunched: {name: "Endurance", level_range: [1, 2]}
          volume: {name: "Endurance", level_range: [2, 4]}
          goat: {name: "Endurance", level_range: [2, 5]}

  build:
    description: "Raise threshold, extend VO2max duration, race-like demands"
    weeks_to_race: "8-12"
    level_range: [3, 5]
    slots:
      intensity_1:
        default: "Threshold Accumulation"
        alternatives: ["Threshold Progressive", "Threshold Steady"]
        overrides:
          time_crunched: {name: "Threshold Progressive"}
          volume: {name: "Threshold Accumulation"}
      intensity_2:
        default: "VO2max Extended"
        alternatives: ["VO2max Steady Intervals", "VO2 Bookend"]
        overrides:
          time_crunched: {name: "VO2max Extended"}
          volume: {name: "VO2max Steady Intervals"}
      intensity_3:
        default: "Blended VO2max and G Spot"
        alternatives: ["Race Simulation", "Mixed Intervals"]
        note: "Kitchen Sink family when Tier 3 archetypes available"
        overrides:
          time_crunched: {name: "Mixed Intervals"}
          volume: {name: "Blended Endurance, Threshold, and Sprints"}
      long_ride:
        default: "Endurance with Surges"
        alternatives: ["NP/IF Target", "Endurance Blocks"]
        level_range: [3, 5]
        overrides:
          # The long-ride slot must ALWAYS be an endurance ride, never a
          # short quality session. time_crunched used to get "Race
          # Simulation" (75-80min) here — shorter than its own fillers, on
          # athletes with a wide-open long-ride day. Keep it endurance.
          time_crunched: {name: "Endurance with Surges", level_range: [3, 5]}
          volume: {name: "Endurance with Surges", level_range: [4, 6]}
      filler:
        default: "Endurance"
        pool: ["Endurance", "Cadence Work", "Endurance"]
        level_range: [1, 3]

  race_prep:
    description: "Sharpen race fitness, practice pacing/fueling, reduce volume"
    weeks_to_race: "4-8"
    level_range: [4, 6]
    slots:
      intensity_1:
        default: "Race Simulation"
        overrides:
          time_crunched: {name: "Race Simulation", level_range: [4, 5]}
          volume: {name: "Race Simulation", level_range: [5, 6]}
      intensity_2:
        default: "Blended VO2max and G Spot"
        alternatives: ["Threshold Accumulation", "VO2max Extended"]
        note: "Kitchen Sink when available"
        overrides:
          time_crunched: {name: "Mixed Intervals"}
          volume: {name: "Blended Endurance, Threshold, and Sprints"}
      intensity_3:
        default: null
        note: "Openers if race week approaches"
      long_ride:
        default: "Endurance with Surges"
        alternatives: ["NP/IF Target"]
        level_range: [3, 5]
        overrides:
          time_crunched: {name: "Endurance with Surges", level_range: [3, 4]}
          volume: {name: "Endurance with Surges", level_range: [4, 5]}
      filler:
        default: "Endurance"
        pool: ["Endurance", "Cadence Work"]
        level_range: [1, 2]

  racing:
    description: "Taper, arrive fresh, openers only"
    weeks_to_race: "<4"
    level_range: [1, 3]
    slots:
      intensity_1:
        default: "Openers"
        note: "One session mid-week only"
      intensity_2:
        default: null
        note: "Maybe Threshold Touch L1-2 if >2 weeks out"
      intensity_3:
        default: null
      long_ride:
        default: "Endurance"
        level_range: [2, 3]
        note: "Reduced duration"
      filler:
        default: "Rest Day"

# ---------------------------------------------------------------------------
# Discipline overlays — widen rotation pools per race discipline.
# extra_alternatives are APPENDED to the slot's alternatives before
# block-number rotation, so gravel athletes naturally cycle through
# gravel-specific work in some blocks, road athletes through threshold
# variants, MTB through sprint/neuromuscular work.
# ---------------------------------------------------------------------------
disciplines:
  # NOTE: build intensity_2 is the VO2max slot — discipline extras must NOT
  # displace it (R02 requires VO2 stimulus every 14 days). Build-phase extras
  # go on intensity_3 (the optional third slot).
  gravel:
    base:
      intensity_2:
        extra_alternatives: ["SFR"]
    build:
      intensity_3:
        extra_alternatives: ["Microbursts", "Mixed Climbing Variations"]
    race_prep:
      intensity_3:
        extra_alternatives: ["Microbursts"]
  road:
    base:
      # "Tempo with Sprints" is a genuine addition (not already in the base
      # intensity_2 pool: Cadence Work/Mixed Intervals/Mixed Climbing) — the
      # road headline differentiator. Cadence Work is listed too (matches
      # the approved menu) but is already generic, so it's a documented
      # no-op via the workout_selector dedup guard.
      intensity_2:
        extra_alternatives: ["Tempo with Sprints", "Cadence Work"]
    build:
      # NOTE: no road-specific intensity_1 addition. The 31-canonical-type
      # vocabulary has only 3 Threshold-family types (Accumulation/
      # Progressive/Steady) and the generic pool already rotates through
      # all 3 — there is no non-duplicate, non-phantom name left to add
      # here. The old "Threshold Progressive" overlay was a no-op (already
      # in the generic alternatives), same bug as intensity_3 below; removed
      # rather than left as misleading dead config. See
      # ROADIE_PHILOSOPHY_CRITIQUE.md fix #1 report for the residual gap.
      intensity_3:
        # "Microbursts" is a genuine addition — true stochastic/punchy road
        # work, not in the generic pool (Race Simulation/Mixed Intervals).
        # Replaces the old "Blended VO2max and G Spot" overlay, which was a
        # no-op (already the generic default).
        extra_alternatives: ["Microbursts"]
    race_prep:
      # Was genuinely unreachable before (generic default: null skips the
      # slot in workout_selector.py before the overlay is ever applied).
      # `default` here activates the slot for road via the discipline
      # overlay (see workout_selector.py's discipline-default-before-null-
      # check). "Race Simulation" renders through the merged Race_Simulation
      # archetype pool (new_archetypes.py/advanced_archetypes.py/
      # imported_archetypes.py), which includes Attacks and Repeatability,
      # Breakaway Simulation, Variable Pace Chaos, Hard Starts, and
      # Structured Fartlek — genuine race-demand/attack-simulation work.
      intensity_3:
        default: "Race Simulation"
  mtb:
    base:
      intensity_2:
        extra_alternatives: ["Stomps"]
    build:
      intensity_3:
        extra_alternatives: ["Microbursts", "Stomps"]
    race_prep:
      intensity_3:
        extra_alternatives: ["Microbursts"]

# Recovery week overrides (apply to ANY phase recovery week)
recovery_week:
  allowed_workouts:
    - "Endurance"       # L1-L2 ONLY
    - "Openers"         # ONE session only
    - "Rest Day"
  forbidden_workouts:
    - "Endurance Blocks"
    - "Endurance with Surges"
    - "Cadence Work"
    - "Tempo"
    - "Tempo with Accelerations"
    - "Tempo with Sprints"
    - "Threshold Accumulation"
    - "Threshold Progressive"
    - "Threshold Steady"
    - "VO2max 30/30"
    - "VO2max 40/20"
    - "VO2max Extended"
    - "VO2max Steady Intervals"
    - "SFR"
    - "Race Simulation"
    - "Mixed Intervals"
    - "Mixed Climbing"
    - "Mixed Climbing Variations"
    - "Buffer Workout"
  max_endurance_level: 2
  openers_count: 1
