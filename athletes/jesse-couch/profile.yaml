    Total Training per week, 15 is too much. The event in the Czech Republic I have done before. I will fly there so I will
    lose a day there and a day back. The total length of each day is only about 32 miles, but they include 4 timed sections
    just like Nova Eroica (which i won my age group in 2025). I will travel to California on the 15th of October and then
    onto AZ on the 18 or 19. I have a bike in California with a power meter. I have a bike in AZ with a power meter. I have
    done at least 12 of the races in your catalog including the Gravel World Championships in 2022, 2023, 2024. Too many wrecks
