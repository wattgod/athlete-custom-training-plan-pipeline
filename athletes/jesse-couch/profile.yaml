    I have not even tested...The gym I belong to in Italy and in Tucson is not open on Sundays. ALSO, once I am in Tucson
    I have access to the Old Man Shootout on Saturdays, not quite the Shootout, but some fast old guys, it's 115 km and a
    very hard pace.
