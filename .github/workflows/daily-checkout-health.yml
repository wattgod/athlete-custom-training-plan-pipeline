name: "Daily Checkout Health Check"

# Runs every morning at 7 AM Mountain (13:00 UTC)
# Verifies all three checkout flows: training plans, coaching, consulting.
# No real charges — sessions expire after 60 minutes.

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

env:
  API_BASE: https://athlete-custom-training-plan-pipeline-production.up.railway.app

jobs:
  checkout-health:
    name: "Verify all checkout flows"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "Health check — Railway service"
        run: |
          RESPONSE=$(curl -sf $API_BASE/health)
          echo "$RESPONSE" | python3 -m json.tool
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "ok" ]; then
            echo "::error::Health check failed: status=$STATUS"
            exit 1
          fi

      - name: "Training plan checkout"
        run: |
          RESPONSE=$(curl -sf -X POST \
            $API_BASE/api/create-checkout \
            -H "Content-Type: application/json" \
            -H "Origin: https://gravelgodcycling.com" \
            -d '{
              "email": "healthcheck@gravelgodcycling.com",
              "name": "Daily Health Check [TEST]",
              "races": [{"name": "Health Check Race", "date": "2026-12-31", "priority": "A"}],
              "ftp": 200,
              "weight": "70kg"
            }')

          URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('checkout_url',''))")
          if [[ "$URL" != https://checkout.stripe.com/* ]]; then
            echo "::error::Training plan checkout failed — no valid Stripe URL"
            echo "$RESPONSE" | python3 -m json.tool
            exit 1
          fi

          PRICE=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['price']['price_cents'])")
          if [ "$PRICE" -lt 6000 ] || [ "$PRICE" -gt 25000 ]; then
            echo "::error::Unexpected training plan price: $PRICE cents"
            exit 1
          fi
          echo "Training plan checkout OK ($PRICE cents)"

      - name: "Coaching checkout (mid tier)"
        run: |
          RESPONSE=$(curl -sf -X POST \
            $API_BASE/api/create-coaching-checkout \
            -H "Content-Type: application/json" \
            -H "Origin: https://gravelgodcycling.com" \
            -d '{
              "email": "healthcheck@gravelgodcycling.com",
              "name": "Daily Health Check [TEST]",
              "tier": "mid"
            }')

          URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('checkout_url',''))")
          if [[ "$URL" != https://checkout.stripe.com/* ]]; then
            echo "::error::Coaching checkout failed — no valid Stripe URL"
            echo "$RESPONSE" | python3 -m json.tool
            exit 1
          fi
          echo "Coaching checkout OK (mid tier)"

      - name: "Consulting checkout (1 hour)"
        run: |
          RESPONSE=$(curl -sf -X POST \
            $API_BASE/api/create-consulting-checkout \
            -H "Content-Type: application/json" \
            -H "Origin: https://gravelgodcycling.com" \
            -d '{
              "email": "healthcheck@gravelgodcycling.com",
              "name": "Daily Health Check [TEST]",
              "hours": 1
            }')

          URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('checkout_url',''))")
          if [[ "$URL" != https://checkout.stripe.com/* ]]; then
            echo "::error::Consulting checkout failed — no valid Stripe URL"
            echo "$RESPONSE" | python3 -m json.tool
            exit 1
          fi
          echo "Consulting checkout OK (1 hour)"

      - name: "Questionnaire-started endpoint"
        run: |
          RESPONSE=$(curl -sf -X POST \
            $API_BASE/api/questionnaire-started \
            -H "Content-Type: application/json" \
            -H "Origin: https://gravelgodcycling.com" \
            -d '{
              "email": "healthcheck@gravelgodcycling.com",
              "name": "Daily Health Check [TEST]",
              "sections_reached": 1,
              "source": "health-check"
            }')

          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
          if [ "$STATUS" != "tracked" ] && [ "$STATUS" != "already_tracked" ]; then
            echo "::error::Questionnaire-started endpoint failed: $STATUS"
            exit 1
          fi
          echo "Questionnaire-started endpoint OK ($STATUS)"
