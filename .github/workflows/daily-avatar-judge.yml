name: "Daily Avatar Judge"

# A couple of synthetic-but-realistic athletes come through the real
# pipeline every day; each plan is run through the deterministic
# send-worthy contract and an LLM coach-judge. Findings post as an issue.
#
# This is the fuzzing + judgment layer over test_order_acceptance.py's
# fixed golden orders: random realistic input + a coach's eye, daily.

on:
  workflow_dispatch:
    inputs:
      count:
        description: "how many avatars"
        default: "3"
  schedule:
    - cron: '0 13 * * *'  # daily 13:00 UTC

permissions:
  contents: write   # commit the growing quality_history + backlog
  issues: write

jobs:
  judge:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chromium (PDF engine)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml python-dateutil pypdf anthropic requests
          pip install -r webhook/requirements.txt || echo "webhook reqs partial"

      - name: Run the improvement loop (avatars → judge → aggregate → score)
        working-directory: athletes/scripts
        env:
          PYTHONPATH: ${{ github.workspace }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GG_DELIVERY_DIR: ${{ runner.temp }}/avatar-delivery
        run: |
          mkdir -p "$GG_DELIVERY_DIR"
          SEED=$(date -u +%Y-%m-%d)
          COUNT="${{ github.event.inputs.count || '8' }}"
          # Loop appends to config/quality_history.json and rewrites
          # config/improvement_backlog.md. Never fail the job on a bad plan.
          python improvement_loop.py --count "$COUNT" --seed "$SEED" || true

      - name: Commit the quality trend + backlog
        run: |
          git config user.name "avatar-judge-bot"
          git config user.email "noreply@gravelgodcycling.com"
          git add athletes/config/quality_history.json athletes/config/improvement_backlog.md
          git diff --cached --quiet || {
            git commit -m "avatar-judge: quality trend $(date -u +%Y-%m-%d)"
            git push
          }

      - name: Post the ranked backlog as an issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT="athletes/config/improvement_backlog.md"
          [ -s "$REPORT" ] || { echo "No backlog produced"; exit 0; }
          gh issue create \
            --title "Avatar judge — $(date -u +%Y-%m-%d)" \
            --body-file "$REPORT" --label "avatar-judge" 2>/dev/null \
          || gh issue create \
            --title "Avatar judge — $(date -u +%Y-%m-%d)" \
            --body-file "$REPORT"
