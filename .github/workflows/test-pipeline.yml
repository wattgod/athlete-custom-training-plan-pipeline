name: Test Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'athletes/scripts/**'
      - 'athletes/config/**'
      - 'athletes/*/profile.yaml'
      - 'webhook/**'
      - 'config.yaml'
      - 'requirements.txt'
      - '.github/workflows/test-pipeline.yml'
  pull_request:
    branches: [main]
    paths:
      - 'athletes/scripts/**'
      - 'athletes/config/**'
      - 'webhook/**'
      - 'config.yaml'
      - 'requirements.txt'
  # Run regularly even without commits — catches drift from external data
  # (race dates rolling past, library or config edits) and proves the whole
  # order path still produces send-worthy plans.
  schedule:
    - cron: '0 14 * * 1'  # Mondays 14:00 UTC

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chromium (PDF engine — must match production)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
          which chromium-browser || which chromium || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml python-dateutil pytest pypdf pillow requests beautifulsoup4
          # webhook deps — the acceptance suite drives the real order path
          pip install -r webhook/requirements.txt || echo "webhook reqs partial"

      - name: Lint (syntax + undefined names)
        run: |
          pip install flake8
          flake8 athletes/scripts/*.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run full unit + guard suite
        working-directory: athletes/scripts
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Acceptance tests auto-skip here (no GG_RUN_ACCEPTANCE) — this is
          # the fast layer: unit tests + all the content/PDF/compliance guards.
          python -m pytest . -q --ignore=test_order_acceptance.py

      - name: Run ORDER ACCEPTANCE (real pipeline end-to-end + PDF)
        working-directory: athletes/scripts
        env:
          PYTHONPATH: ${{ github.workspace }}
          GG_RUN_ACCEPTANCE: '1'
        run: |
          # The send-worthy contract: each golden order runs the real
          # pipeline and the deliverable must pass every coherence check.
          python -m pytest test_order_acceptance.py -q
